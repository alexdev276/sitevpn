<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля - VPN Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full mx-auto p-6 bg-white rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-center text-gray-900 mb-6">Восстановление пароля</h2>
        <form id="forgotForm">
            <div class="mb-4">
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md">
            </div>
            <div id="message" class="mb-4 text-sm hidden"></div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700">
                Отправить инструкции
            </button>
        </form>
        <p class="mt-4 text-center text-sm">
            <a href="login.html" class="text-indigo-600 hover:text-indigo-500">Вернуться ко входу</a>
        </p>
    </div>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msgDiv = document.getElementById('message');
            try {
                const resp = await fetch('http://localhost:8000/api/v1/auth/request-password-reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await resp.json();
                msgDiv.textContent = data.message || 'Инструкции отправлены на email';
                msgDiv.classList.remove('hidden', 'text-red-600');
                msgDiv.classList.add('text-green-600');
            } catch (error) {
                msgDiv.textContent = 'Ошибка отправки';
                msgDiv.classList.remove('hidden', 'text-green-600');
                msgDiv.classList.add('text-red-600');
            }
        });
    </script>
</body>
</html>
