version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: vpn_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vpn_pass}
      POSTGRES_DB: ${POSTGRES_DB:-vpn_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn_user -d vpn_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vpn_network

  redis:
    image: redis:7-alpine
    container_name: vpn_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vpn_network

  app:
    build: .
    container_name: vpn_app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./src:/app/src
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vpn_network

  celery-worker:
    build: .
    container_name: vpn_celery_worker
    command: celery -A src.tasks.celery_app worker --loglevel=info
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    depends_on:
      - redis
      - db
    networks:
      - vpn_network

  celery-beat:
    build: .
    container_name: vpn_celery_beat
    command: celery -A src.tasks.celery_app beat --loglevel=info
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    depends_on:
      - redis
      - db
    networks:
      - vpn_network

volumes:
  postgres_data:
  redis_data:

networks:
  vpn_network:
    driver: bridge
