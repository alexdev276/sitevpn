version: "3.9"

services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vpn
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: vpn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    command: celery -A src.tasks.celery_app.celery_app worker -l info
    env_file:
      - .env
    depends_on:
      - redis
      - db
    volumes:
      - .:/app

  celery_beat:
    build: .
    command: celery -A src.tasks.celery_app.celery_app beat -l info
    env_file:
      - .env
    depends_on:
      - redis
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:

